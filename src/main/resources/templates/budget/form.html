<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="icon" th:href="@{/favicon.ico}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Budget - ExpenseManager</title>
    <!-- Theme configuration head injector -->
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Style -->
    <link rel="stylesheet" th:href="@{/css/layout.css}">
</head>
<body>

    <!-- Sidebar Fragment -->
    <div th:replace="~{fragments/sidebar :: sidebar('budgets')}"></div>

    <!-- Header Navbar Fragment -->
    <div th:replace="~{fragments/navbar :: navbar('Define Category Budget')}"></div>

    <!-- Main Workspace -->
    <main class="main-wrapper animate-fade-in">

        <div class="row justify-content-center">
            <div class="col-12 col-lg-8 col-xl-6">
                <!-- Form Glass Card -->
                <div class="glass-card p-4">
                    <!-- Heading -->
                    <div class="d-flex align-items-center gap-2 mb-4 border-bottom border-secondary border-opacity-10 pb-3">
                        <i class="bi bi-calculator-fill text-primary fs-4"></i>
                        <h5 class="fw-bold m-0">Set Monthly Expense Limit</h5>
                    </div>

                    <!-- General Error Message -->
                    <div th:if="${errorMessage}" class="alert alert-danger border-0 text-danger bg-danger bg-opacity-10 rounded-3 small mb-4 py-2" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${errorMessage}">Error Message</span>
                    </div>

                    <!-- Budget Form -->
                    <form th:action="@{/budgets/new}" th:object="${budget}" method="post">
                        
                        <!-- Category Selection -->
                        <div class="mb-3">
                            <label for="categoryId" class="form-label text-muted small fw-medium">Expense Category</label>
                            <select id="categoryId" th:field="*{categoryId}" class="form-select" required>
                                <option value="">-- Choose Category --</option>
                                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                            </select>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}">Category error</div>
                            <small class="text-muted mt-1 d-block">Budgets can only be set on Expense categories.</small>
                        </div>

                        <!-- Amount Field -->
                        <div class="mb-3">
                            <label for="amount" class="form-label text-muted small fw-medium">Monthly Limit Amount (VND)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 border-secondary border-opacity-10 text-muted">VND</span>
                                <input type="number" step="1" min="1" inputmode="numeric" id="amount" th:field="*{amount}" class="form-control border-start-0" placeholder="1000000" required>
                            </div>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}">Amount error</div>
                        </div>

                        <div class="row mb-4">
                            <!-- Month Selection -->
                            <div class="col-12 col-md-6 mb-3 mb-md-0">
                                <label for="month" class="form-label text-muted small fw-medium">Target Month</label>
                                <select id="month" th:field="*{month}" class="form-select" required>
                                    <option th:each="m : ${months}" th:value="${m.value}" th:text="${m.name}"></option>
                                </select>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('month')}" th:errors="*{month}">Month error</div>
                            </div>
                            
                            <!-- Year Selection -->
                            <div class="col-12 col-md-6">
                                <label for="year" class="form-label text-muted small fw-medium">Target Year</label>
                                <select id="year" th:field="*{year}" class="form-select" required>
                                    <option th:each="y : ${years}" th:value="${y}" th:text="${y}"></option>
                                </select>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('year')}" th:errors="*{year}">Year error</div>
                            </div>
                        </div>

                        <!-- Action Controls -->
                        <div class="d-flex gap-3 justify-content-end">
                            <a th:href="@{/budgets}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">
                                <span>Save Limit Rule</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Footer Fragment -->
        <div th:replace="~{fragments/footer :: footer}"></div>
    </main>

</body>
</html>
