<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="icon" th:href="@{/favicon.ico}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resource Not Found - ExpenseManager</title>
    <!-- Theme configuration head injector -->
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Style -->
    <link rel="stylesheet" th:href="@{/css/layout.css}">
</head>
<body class="auth-wrapper">

    <div class="glass-card text-center p-5 animate-fade-in" style="max-width: 500px;">
        <div class="text-danger mb-4">
            <i class="bi bi-exclamation-circle fs-1"></i>
        </div>
        <h1 class="fw-bold mb-2">404</h1>
        <h5 class="fw-semibold mb-3">Resource Not Found</h5>
        
        <!-- Error Message detail -->
        <p class="text-muted small mb-4" th:text="${errorMessage != null ? errorMessage : 'The requested page or record could not be found or you do not have permission to view it.'}">
            The requested page or record could not be found.
        </p>

        <!-- Redirect control -->
        <a th:href="@{/dashboard}" class="btn btn-primary px-4 py-2">
            <i class="bi bi-house-door me-2"></i> Go to Dashboard
        </a>
    </div>

</body>
</html>
