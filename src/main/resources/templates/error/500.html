<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error - ExpenseManager</title>
    <!-- Theme configuration head injector -->
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Style -->
    <link rel="stylesheet" th:href="@{/css/layout.css}">
</head>
<body class="auth-wrapper">

    <div class="glass-card text-center p-5 animate-fade-in" style="max-width: 550px;">
        <div class="text-warning mb-4">
            <i class="bi bi-shield-exclamation fs-1"></i>
        </div>
        <h1 class="fw-bold mb-2">500</h1>
        <h5 class="fw-semibold mb-3">System Exception</h5>
        
        <!-- Error Message detail -->
        <p class="text-muted small mb-4" th:text="${errorMessage}">
            An unexpected error occurred during processing.
        </p>

        <!-- Debug details if present -->
        <div th:if="${exceptionDetails}" class="text-start bg-light bg-opacity-50 border p-3 rounded-3 mb-4 overflow-auto" style="max-height: 150px; border-color: var(--border-color) !important;">
            <code class="small text-muted" th:text="${exceptionDetails}">Exception details trace...</code>
        </div>

        <!-- Redirect control -->
        <a th:href="@{/dashboard}" class="btn btn-primary px-4 py-2">
            <i class="bi bi-arrow-left-circle me-2"></i> Back to Safety
        </a>
    </div>

</body>
</html>
