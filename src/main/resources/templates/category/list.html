<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="icon" th:href="@{/favicon.ico}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Categories - ExpenseManager</title>
    <!-- Theme configuration head injector -->
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Style -->
    <link rel="stylesheet" th:href="@{/css/layout.css}">
</head>
<body>

    <!-- Sidebar Fragment -->
    <div th:replace="~{fragments/sidebar :: sidebar('categories')}"></div>

    <!-- Header Navbar Fragment -->
    <div th:replace="~{fragments/navbar :: navbar('Categories Management')}"></div>

    <!-- Main Workspace -->
    <main class="main-wrapper animate-fade-in">

        <!-- Flash Alert Messages -->
        <div th:if="${successMessage}" class="alert alert-success border-0 text-success bg-success bg-opacity-10 rounded-3 small mb-4 py-2" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${successMessage}">Success!</span>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger border-0 text-danger bg-danger bg-opacity-10 rounded-3 small mb-4 py-2" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${errorMessage}">Error!</span>
        </div>

        <!-- Category Table Container -->
        <div class="glass-card p-4">
            <div class="d-flex align-items-center justify-content-between mb-4">
                <h5 class="fw-bold m-0">Available Categories</h5>
                <a th:href="@{/categories/new}" class="btn btn-primary btn-sm d-flex align-items-center gap-2" style="padding: 8px 16px; border-radius: 8px;">
                    <i class="bi bi-plus-lg"></i>
                    <span>Add Category</span>
                </a>
            </div>

            <div class="table-responsive">
                <table class="table table-custom m-0">
                    <thead>
                        <tr>
                            <th>Category Name</th>
                            <th>Type</th>
                            <th>Scope / Access</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="cat : ${categories}">
                            <td class="fw-semibold" th:text="${cat.name}">Utilities</td>
                            <td>
                                <span class="badge-custom" th:classappend="${cat.type.name() == 'INCOME' ? 'badge-income' : 'badge-expense'}"
                                      th:text="${cat.type.name()}">EXPENSE</span>
                            </td>
                            <td>
                                <span th:if="${cat.system}" class="badge bg-secondary bg-opacity-10 text-muted small" style="border: 1px solid rgba(128,128,128,0.15);">
                                    <i class="bi bi-globe me-1"></i> Global / System
                                </span>
                                <span th:if="${!cat.system}" class="badge bg-primary bg-opacity-10 text-primary small" style="border: 1px solid rgba(99, 102, 241, 0.15);">
                                    <i class="bi bi-person-lock me-1"></i> Custom / Personal
                                </span>
                            </td>
                            <td class="text-end">
                                <!-- Actions are only editable for user-defined categories -->
                                <div th:if="${!cat.system}" class="d-inline-flex gap-2">
                                    <a th:href="@{/categories/edit/{id}(id=${cat.id})}" class="btn btn-secondary btn-sm px-2 py-1" style="border-radius: 6px;">
                                        <i class="bi bi-pencil-square"></i>
                                    </a>
                                    <!-- Delete form protecting against CSRF -->
                                    <form th:action="@{/categories/delete/{id}(id=${cat.id})}" method="post" onsubmit="return confirm('Deleting a category will permanently delete all expenses, incomes, and budgets linked to it. Are you sure you want to proceed?');" style="display:inline;">
                                        <button type="submit" class="btn btn-secondary btn-sm px-2 py-1 text-danger" style="border-radius: 6px;">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </div>
                                <div th:if="${cat.system}" class="text-muted small px-3">
                                    <i class="bi bi-lock-fill" title="System categories cannot be modified"></i> Locked
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(categories)}">
                            <td colspan="4" class="text-center text-muted py-5">
                                <i class="bi bi-tags fs-1 d-block mb-3 opacity-50"></i>
                                <span>No categories registered.</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Footer Fragment -->
        <div th:replace="~{fragments/footer :: footer}"></div>
    </main>

</body>
</html>
