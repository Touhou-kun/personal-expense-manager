<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - ExpenseManager</title>
    <!-- Theme configuration head injector -->
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Style -->
    <link rel="stylesheet" th:href="@{/css/layout.css}">
</head>
<body class="auth-wrapper">

    <div class="glass-card auth-card animate-fade-in">
        <!-- Brand Logo -->
        <div class="text-center mb-4">
            <div class="bg-primary d-inline-flex align-items-center justify-content-center rounded-3 mb-3" style="width: 50px; height: 50px; box-shadow: 0 4px 14px rgba(79, 70, 229, 0.25);">
                <i class="bi bi-wallet2 text-white fs-3"></i>
            </div>
            <h3 class="fw-bold mb-1">Welcome Back</h3>
            <p class="text-muted small">Manage your finances with confidence</p>
        </div>

        <!-- Alert messages -->
        <div th:if="${param.error}" class="alert alert-danger border-0 text-danger bg-danger bg-opacity-10 rounded-3 small mb-4 py-2" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> Invalid username, email or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-success border-0 text-success bg-success bg-opacity-10 rounded-3 small mb-4 py-2" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i> You have logged out successfully.
        </div>
        <div th:if="${param.registered}" class="alert alert-success border-0 text-success bg-success bg-opacity-10 rounded-3 small mb-4 py-2" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i> Account registered! Please sign in.
        </div>

        <!-- Login Form -->
        <form th:action="@{/login}" method="post">
            <!-- Username Input -->
            <div class="mb-3">
                <label for="username" class="form-label text-muted small fw-medium">Username or Email</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 border-secondary border-opacity-10 text-muted">
                        <i class="bi bi-person"></i>
                    </span>
                    <input type="text" id="username" name="username" class="form-control border-start-0" placeholder="Enter username or email" required autofocus style="border-color: var(--border-color);">
                </div>
            </div>

            <!-- Password Input -->
            <div class="mb-4">
                <label for="password" class="form-label text-muted small fw-medium">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 border-secondary border-opacity-10 text-muted">
                        <i class="bi bi-lock"></i>
                    </span>
                    <input type="password" id="password" name="password" class="form-control border-start-0" placeholder="Enter password" required style="border-color: var(--border-color);">
                </div>
            </div>

            <!-- Remember me -->
            <div class="d-flex align-items-center justify-content-between mb-4">
                <div class="form-check m-0">
                    <input class="form-check-input bg-transparent border-secondary border-opacity-50" type="checkbox" id="remember-me" name="remember-me">
                    <label class="form-check-label text-muted small" for="remember-me">
                        Remember me
                    </label>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary w-100 mb-3" style="padding: 12px; box-shadow: 0 4px 14px rgba(79, 70, 229, 0.25);">
                <span>Sign In</span>
            </button>
        </form>

        <!-- Redirect to signup -->
        <div class="text-center mt-3">
            <span class="text-muted small">Don't have an account? </span>
            <a th:href="@{/register}" class="text-primary small fw-semibold text-decoration-none">Create Account</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
