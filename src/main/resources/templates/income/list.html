<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="icon" th:href="@{/favicon.ico}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Incomes - ExpenseManager</title>
    <!-- Theme configuration head injector -->
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Style -->
    <link rel="stylesheet" th:href="@{/css/layout.css}">
</head>
<body>

    <!-- Sidebar Fragment -->
    <div th:replace="~{fragments/sidebar :: sidebar('incomes')}"></div>

    <!-- Header Navbar Fragment -->
    <div th:replace="~{fragments/navbar :: navbar('Income Transactions')}"></div>

    <!-- Main Workspace -->
    <main class="main-wrapper animate-fade-in">

        <!-- Flash Alert Messages -->
        <div th:if="${successMessage}" class="alert alert-success border-0 text-success bg-success bg-opacity-10 rounded-3 small mb-4 py-2" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${successMessage}">Success!</span>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger border-0 text-danger bg-danger bg-opacity-10 rounded-3 small mb-4 py-2" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${errorMessage}">Error!</span>
        </div>

        <!-- Search & Filter Card -->
        <div class="glass-card p-4 mb-4">
            <h5 class="fw-bold mb-3"><i class="bi bi-funnel"></i> Search & Filters</h5>
            <form th:action="@{/incomes}" method="get" class="row g-3">
                <!-- Keyword search -->
                <div class="col-12 col-md-3">
                    <label for="keyword" class="form-label text-muted small">Keyword</label>
                    <input type="text" id="keyword" name="keyword" th:value="${keyword}" class="form-control" placeholder="Search title or description...">
                </div>
                <!-- Category filter -->
                <div class="col-12 col-md-3">
                    <label for="categoryId" class="form-label text-muted small">Category</label>
                    <select id="categoryId" name="categoryId" class="form-select">
                        <option value="">-- All Categories --</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}" th:selected="${cat.id == categoryId}"></option>
                    </select>
                </div>
                <!-- Start date -->
                <div class="col-6 col-md-2">
                    <label for="startDate" class="form-label text-muted small">Start Date</label>
                    <input type="date" id="startDate" name="startDate" th:value="${startDate}" class="form-control">
                </div>
                <!-- End date -->
                <div class="col-6 col-md-2">
                    <label for="endDate" class="form-label text-muted small">End Date</label>
                    <input type="date" id="endDate" name="endDate" th:value="${endDate}" class="form-control">
                </div>
                <!-- Action Buttons -->
                <div class="col-12 col-md-2 d-flex align-items-end gap-2">
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="bi bi-search"></i> Filter
                    </button>
                    <a th:href="@{/incomes}" class="btn btn-secondary w-100 py-2">
                        Reset
                    </a>
                </div>
            </form>
        </div>

        <!-- Income Table Container -->
        <div class="glass-card p-4">
            <div class="d-flex align-items-center justify-content-between mb-4">
                <h5 class="fw-bold m-0">Transaction List</h5>
                <a th:href="@{/incomes/new}" class="btn btn-primary btn-sm d-flex align-items-center gap-2" style="padding: 8px 16px; border-radius: 8px;">
                    <i class="bi bi-plus-lg"></i>
                    <span>Log Income</span>
                </a>
            </div>

            <div class="table-responsive">
                <table class="table table-custom m-0">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Category</th>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Amount</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="inc : ${incomes}">
                            <td class="fw-semibold text-white" th:text="${inc.title}" style="color: var(--text-main) !important;">Salary</td>
                            <td>
                                <span class="badge-custom badge-income" th:text="${inc.categoryName}">Payroll</span>
                            </td>
                            <td class="text-muted" th:text="${inc.transactionDate}">2026-06-16</td>
                            <td class="text-muted text-truncate" style="max-width: 250px;" th:text="${inc.description != null && !inc.description.isEmpty() ? inc.description : '-'}">Monthly salary</td>
                            <td class="fw-bold text-success" th:text="${'+' + #numbers.formatDecimal(inc.amount, 1, 'POINT', 0, 'COMMA') + ' VND'}">+5.000.000 VND</td>
                            <td class="text-end">
                                <div class="d-inline-flex gap-2">
                                    <a th:href="@{/incomes/edit/{id}(id=${inc.id})}" class="btn btn-secondary btn-sm px-2 py-1" style="border-radius: 6px;">
                                        <i class="bi bi-pencil-square"></i>
                                    </a>
                                    <!-- Delete form protecting against CSRF -->
                                    <form th:action="@{/incomes/delete/{id}(id=${inc.id})}" method="post" onsubmit="return confirm('Are you sure you want to delete this income record?');" style="display:inline;">
                                        <button type="submit" class="btn btn-secondary btn-sm px-2 py-1 text-danger" style="border-radius: 6px;">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(incomes)}">
                            <td colspan="6" class="text-center text-muted py-5">
                                <i class="bi bi-calendar-x fs-1 d-block mb-3 opacity-50"></i>
                                <span>No income entries found matching the filter constraints.</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Footer Fragment -->
        <div th:replace="~{fragments/footer :: footer}"></div>
    </main>

</body>
</html>
